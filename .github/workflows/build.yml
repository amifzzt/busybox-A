name: Build BusyBox

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc make

      - name: Fix permissions
        run: find . -type f -exec chmod +x {} +

      - name: Configure
        run: |
          make defconfig
          # Disable TC (traffic control) - incompatible with newer kernel headers
          sed -i 's/CONFIG_TC=y/CONFIG_TC=n/' .config
          sed -i 's/CONFIG_FEATURE_TC_INGRESS=y/CONFIG_FEATURE_TC_INGRESS=n/' .config

      - name: Build
        run: make -j$(nproc)

      - name: Strip binary
        run: strip busybox

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: busybox
          path: busybox
